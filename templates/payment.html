<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nâng cấp thanh toán - Hệ thống đăng ký OpenAI</title>
    <link rel="stylesheet" href="/static/css/style.css?v={{ static_version }}" />
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg?v={{ static_version }}" />
    <style>
      .plan-cards {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 20px;
      }
      .plan-card {
        border: 2px solid var(--border-color);
        border-radius: 8px;
        padding: 20px;
        cursor: pointer;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        text-align: center;
      }
      .plan-card:hover {
        border-color: var(--primary-color);
      }
      .plan-card.selected {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
      }
      .plan-card h3 {
        margin: 0 0 8px;
        font-size: 1.2rem;
      }
      .plan-card p {
        margin: 0;
        color: var(--text-secondary);
        font-size: 0.9rem;
      }
      .team-options {
        display: none;
      }
      .team-options.show {
        display: block;
      }
      .link-box {
        display: none;
        margin-top: 16px;
      }
      .link-box.show {
        display: block;
      }
      .link-text {
        width: 100%;
        font-family: var(--font-mono);
        font-size: 0.8rem;
        padding: 10px;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        background: var(--bg-secondary);
        color: var(--text-primary);
        resize: vertical;
        min-height: 80px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- 导航栏 -->
      <nav class="navbar">
        <div class="nav-brand">
          <h1>Hệ thống đăng ký OpenAI</h1>
        </div>
        <div class="nav-links">
          <a href="/" class="nav-link">Đăng ký</a>
          <a href="/accounts" class="nav-link">Quản lý tài khoản</a>
          <a href="/email-services" class="nav-link">Dịch vụ email</a>
          <a href="/payment" class="nav-link active">Thanh toán</a>
          <a href="/settings" class="nav-link">Cài đặt</a>
          <a href="/logout" class="nav-link">Đăng xuất</a>
        </div>
        <button class="theme-toggle" onclick="theme.toggle()" title="Chuyển giao diện">🌙</button>
      </nav>

      <!-- 主内容区 -->
      <main class="main-content">
        <div class="page-header">
          <h2>Nâng cấp gói</h2>
          <p class="subtitle">Tạo liên kết thanh toán cho gói Plus hoặc Team của tài khoản</p>
        </div>

        <div class="card">
          <div class="card-header">
            <h3>Chọn gói</h3>
          </div>
          <div class="card-body">
            <!-- 套餐选择 -->
            <div class="plan-cards">
              <div class="plan-card selected" id="plan-plus" onclick="selectPlan('plus')">
                <h3>Plus</h3>
                <p>Gói cá nhân, 20 USD/tháng</p>
              </div>
              <div class="plan-card" id="plan-team" onclick="selectPlan('team')">
                <h3>Team</h3>
                <p>Gói nhóm, tính phí theo số chỗ</p>
              </div>
            </div>

            <!-- 账号选择 -->
            <div class="form-group">
              <label for="account-select">Chọn tài khoản</label>
              <select id="account-select" style="width: 100%">
                <option value="">-- Đang tải... --</option>
              </select>
            </div>

            <!-- 国家选择 -->
            <div class="form-row">
              <div class="form-group">
                <label for="country-select">Quốc gia thanh toán</label>
                <select id="country-select" onchange="onCountryChange()">
                  <option value="SG">Singapore (SGD)</option>
                  <option value="US">Hoa Kỳ (USD)</option>
                  <option value="TR">Thổ Nhĩ Kỳ (TRY)</option>
                  <option value="JP">Nhật Bản (JPY)</option>
                  <option value="HK">Hồng Kông (HKD)</option>
                  <option value="GB">Vương quốc Anh (GBP)</option>
                  <option value="AU">Úc (AUD)</option>
                  <option value="CA">Canada (CAD)</option>
                  <option value="IN">Ấn Độ (INR)</option>
                  <option value="BR">Brazil (BRL)</option>
                  <option value="MX">Mexico (MXN)</option>
                </select>
              </div>
              <div class="form-group">
                <label>Tiền tệ tương ứng</label>
                <input
                  type="text"
                  id="currency-display"
                  value="SGD"
                  readonly
                  style="background: var(--surface-hover); cursor: default"
                />
              </div>
            </div>

            <!-- Team 额外参数 -->
            <div class="team-options" id="team-options">
              <div class="form-row">
                <div class="form-group">
                  <label for="workspace-name">Tên workspace</label>
                  <input type="text" id="workspace-name" value="MyTeam" placeholder="MyTeam" />
                </div>
                <div class="form-group">
                  <label for="seat-quantity">Số chỗ</label>
                  <input type="number" id="seat-quantity" value="5" min="1" max="100" />
                </div>
                <div class="form-group">
                  <label for="price-interval">Chu kỳ thanh toán</label>
                  <select id="price-interval">
                    <option value="month">Theo tháng</option>
                    <option value="year">Theo năm</option>
                  </select>
                </div>
              </div>
            </div>

            <!-- 操作区 -->
            <div class="form-actions">
              <button class="btn btn-primary" onclick="generateLink()">
                Tạo liên kết thanh toán
              </button>
            </div>

            <!-- 链接结果 -->
            <div class="link-box" id="link-box">
              <label>Liên kết thanh toán</label>
              <textarea class="link-text" id="link-text" readonly></textarea>
              <div class="form-actions" style="margin-top: 10px">
                <button class="btn btn-secondary" onclick="copyLink()">Sao chép liên kết</button>
                <button class="btn btn-primary" onclick="openIncognito()">
                  Mở trình duyệt ẩn danh
                </button>
              </div>
              <p class="hint" id="open-status"></p>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="/static/js/utils.js?v={{ static_version }}"></script>
    <script src="/static/js/payment.js?v={{ static_version }}"></script>
  </body>
</html>
